name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o sproxy-linux-amd64 .

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o sproxy-linux-arm64 .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sproxy-linux-amd64
            sproxy-linux-arm64
